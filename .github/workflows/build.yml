name: Build

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v2
      - run: cargo build --release --locked
      - run: zip -r knit.zip *
      - uses: actions/upload-artifact@v2
        with:
          name: knit-latest-mac.zip
          path: knit.zip
